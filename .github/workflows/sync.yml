name: sync

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours, off the top of the hour per GitHub's advice
  workflow_dispatch:

permissions:
  contents: write
  actions: write # to dispatch the bundle workflow after a changed sync

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
        working-directory: .utils
      - run: node .utils/scrape.mjs --concurrency 2
      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "sync: wiki changes $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
            # bot pushes never fire push-triggered workflows; dispatch the release explicitly
            gh workflow run bundle.yml --ref main
          fi
